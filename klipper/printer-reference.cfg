# Reference Klipper config for Creality Ender 3 V2 Neo
# Used for printing Nostromo enclosure
#
# Key learnings for eSUN PLA+HS on Bowden Ender 3:
#   Nozzle temp: 215°C (not 210!)
#   Bed temp: 60°C
#   Retraction: 5mm / 40mm/s (NOT 0.8mm - that's for direct drive!)
#   Speed: 50-80 mm/s (not 200 - that's for CoreXY)
#   Max accel: 2000 mm/s²
#   Pressure advance: 0.3-0.4
#   Fan: 70% max (100% causes temperature instability)
#
# CRITICAL: Always use thermal paste on thermistor!
# Without it: temperature fluctuates ±10°C, random shutdowns
# With it: rock solid ±1°C at 75% heater power
#
# Always run PID_CALIBRATE after changing thermistor/heater:
#   PID_CALIBRATE HEATER=extruder TARGET=215
#   SAVE_CONFIG
